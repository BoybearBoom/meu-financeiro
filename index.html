<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistente Financeiro IA</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#0f1220;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.container{
    width:95%;
    max-width:500px;
    background:#151935;
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 30px rgba(0,0,0,0.5);
}
textarea{
    width:100%;
    height:100px;
    border:none;
    border-radius:12px;
    padding:10px;
    background:#0f1220;
    color:white;
    font-size:16px;
}
button{
    width:100%;
    margin-top:10px;
    padding:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#5f6cff,#9b5cff);
    color:white;
    font-size:18px;
    cursor:pointer;
}
.result{
    margin-top:15px;
    padding:10px;
    border-radius:10px;
    background:#0f1220;
}
.error{
    color:#ff6b6b;
}
.success{
    color:#4cd964;
}
</style>
</head>

<body>
<div class="container">
<h2>Assistente IA 💬</h2>

<textarea id="input" placeholder="Ex: comprei tênis 200, mercado 50..."></textarea>
<button onclick="processar()">Enviar</button>

<div id="saida" class="result"></div>
</div>

<script>
function extrairNumeros(texto){
    return [...texto.matchAll(/(\d+[\.,]?\d*)/g)].map(n => parseFloat(n[0].replace(',','.')));
}

function separarItens(texto){
    return texto.split(/,| e /i);
}

function processar(){
    const texto = document.getElementById('input').value.trim();
    const saida = document.getElementById('saida');
    saida.innerHTML = '';

    if(!texto){
        saida.innerHTML = '<div class="error">Digite algo</div>';
        return;
    }

    let itensTexto = separarItens(texto);
    let resultados = [];

    itensTexto.forEach(t=>{
        const nums = extrairNumeros(t);
        if(nums.length){
            resultados.push({
                nome: t.replace(/(\d+[\.,]?\d*)/,'').trim() || 'Despesa',
                valor: nums[0]
            });
        }
    });

    if(!resultados.length){
        saida.innerHTML = '<div class="error">Não consegui identificar valores 😕</div>';
        return;
    }

    let total = 0;
    let html = '<div class="success">Itens identificados:</div>';

    resultados.forEach(r=>{
        total += r.valor;
        html += `<div>• ${r.nome} — R$ ${r.valor.toFixed(2)}</div>`;
    });

    html += `<hr><strong>Total: R$ ${total.toFixed(2)}</strong>`;

    saida.innerHTML = html;
}
</script>

</body>
</html>
