<html lang="pt-BR">

<title>FinancesPro</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:#0f172a;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overscroll-behavior:none}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:#1e293b}
  ::-webkit-scrollbar-thumb{background:#334155;border-radius:2px}
  
  .glass{background:rgba(30,41,59,0.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(148,163,184,0.1)}
  .glass-modal{background:rgba(15,23,42,0.92);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:1px solid rgba(148,163,184,0.15)}
  .card{background:linear-gradient(135deg,rgba(30,41,59,0.9),rgba(15,23,42,0.95));border:1px solid rgba(148,163,184,0.12);border-radius:16px}
  .btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;border:none;transition:transform .15s,box-shadow .15s}
  .btn-primary:active{transform:scale(0.95)}
  .btn-primary:hover{box-shadow:0 0 20px rgba(99,102,241,0.4)}
  .btn-secondary{background:rgba(30,41,59,0.8);border:1px solid rgba(148,163,184,0.2);color:#94a3b8;transition:transform .15s,background .15s}
  .btn-secondary:active{transform:scale(0.95)}
  .btn-secondary:hover{background:rgba(51,65,85,0.9);color:#e2e8f0}
  .status-pending{background:rgba(234,179,8,0.15);border:1px solid rgba(234,179,8,0.3);color:#fbbf24}
  .status-paid{background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.3);color:#4ade80}
  .progress-bar{height:4px;background:#1e293b;position:sticky;top:0;z-index:50}
  .progress-fill{height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6,#ec4899);transition:width .6s cubic-bezier(.4,0,.2,1);border-radius:0 2px 2px 0}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:flex-end;justify-content:center;padding:0}
  @media(min-width:640px){.modal-overlay{align-items:center;padding:1rem}}
  .modal-sheet{width:100%;max-width:560px;max-height:90vh;overflow-y:auto;border-radius:24px 24px 0 0;padding:24px}
  @media(min-width:640px){.modal-sheet{border-radius:24px}}
  .modal-handle{width:40px;height:4px;background:rgba(148,163,184,0.3);border-radius:2px;margin:0 auto 20px}
  .item-row{border-bottom:1px solid rgba(148,163,184,0.07);transition:background .15s}
  .item-row:last-child{border-bottom:none}
  .item-row:hover{background:rgba(148,163,184,0.03)}
  input,select{background:rgba(15,23,42,0.8)!important;border:1px solid rgba(148,163,184,0.2)!important;color:#e2e8f0!important;border-radius:10px!important;padding:12px 14px!important;width:100%;outline:none;transition:border-color .2s}
  input:focus,select:focus{border-color:rgba(99,102,241,0.6)!important;box-shadow:0 0 0 3px rgba(99,102,241,0.15)}
  select option{background:#1e293b;color:#e2e8f0}
  .badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:600;letter-spacing:.3px}
  .animate-in{animation:slideUp .3s ease}
  @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
  .nav-btn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s,background .15s}
  .nav-btn:active{transform:scale(0.9)}
  .empty-state{text-align:center;padding:60px 20px;color:#475569}
  .fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 8px 32px rgba(99,102,241,0.4);transition:transform .2s,box-shadow .2s;z-index:40}
  .fab:active{transform:scale(0.92)}
  .fab:hover{box-shadow:0 12px 40px rgba(99,102,241,0.5)}
  .total-bar{background:linear-gradient(135deg,rgba(99,102,241,0.1),rgba(139,92,246,0.1));border:1px solid rgba(99,102,241,0.2)}
</style>
</head>
<body>

<div id="app">
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>

  <div class="glass sticky top-1 z-30 mx-3 mt-2 rounded-2xl px-4 py-3 mb-4">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span style="font-size:24px">💰</span>
        <div>
          <p class="text-xs text-slate-400 leading-none">FinancesPro</p>
          <p class="text-sm font-semibold text-slate-200 leading-tight" id="headerDate">Abril 2026</p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="exportPDF()" class="btn-secondary text-xs px-3 py-2 rounded-xl flex items-center gap-1.5">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
          PDF
        </button>
        <button onclick="openModal()" class="btn-primary text-xs px-3 py-2 rounded-xl flex items-center gap-1.5">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
          Novo
        </button>
      </div>
    </div>
  </div>

  <div class="flex items-center justify-center gap-4 px-4 mb-4">
    <button onclick="changeMonth(-1)" class="nav-btn btn-secondary">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <span class="text-slate-200 font-semibold text-base min-w-[160px] text-center" id="monthLabel">Abril de 2026</span>
    <button onclick="changeMonth(1)" class="nav-btn btn-secondary">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>

  <div class="grid grid-cols-3 gap-2 px-3 mb-4" id="dashCards">
    <div class="card p-3 animate-in">
      <p class="text-slate-400 text-xs mb-1 leading-none">Saldo</p>
      <p class="text-slate-100 font-bold text-base leading-tight" id="cardSaldo">R$ 0,00</p>
      <p class="text-xs mt-1 text-slate-500">do mês</p>
    </div>
    <div class="card p-3 animate-in" style="animation-delay:.05s">
      <p class="text-slate-400 text-xs mb-1 leading-none">Gastos</p>
      <p class="text-red-400 font-bold text-base leading-tight" id="cardGastos">R$ 0,00</p>
      <p class="text-xs mt-1 text-slate-500">total</p>
    </div>
    <div class="card p-3 animate-in" style="animation-delay:.1s">
      <p class="text-slate-400 text-xs mb-1 leading-none">Cartão</p>
      <p class="text-violet-400 font-bold text-base leading-tight" id="cardCartao">R$ 0,00</p>
      <p class="text-xs mt-1 text-slate-500">fatura</p>
    </div>
  </div>

  <div class="mx-3 mb-4 total-bar rounded-2xl px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <svg width="16" height="16" fill="none" stroke="#818cf8" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4M22 12a10 10 0 11-20 0 10 10 0 0120 0z"/></svg>
      <span class="text-slate-300 text-sm" id="progressLabel">0 de 0 pagas</span>
    </div>
    <span class="text-violet-400 text-sm font-bold" id="progressPct">0%</span>
  </div>

  <div class="px-3 pb-24" id="listContainer">
    <div class="card overflow-hidden" id="itemsList"></div>
  </div>
</div>

<button class="fab" onclick="openModal()">
  <svg width="24" height="24" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
</button>

<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModalOutside(event)">
  <div class="glass-modal modal-sheet animate-in" id="modalSheet">
    <div class="modal-handle"></div>
    <div class="flex items-center justify-between mb-5">
      <h2 class="text-slate-100 font-bold text-lg" id="modalTitle">Nova Despesa</h2>
      <button onclick="closeModal()" class="text-slate-400 hover:text-slate-200 p-1">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <div class="space-y-3">
      <div>
        <label class="text-slate-400 text-xs block mb-1.5 ml-1">Descrição *</label>
        <input type="text" id="inputNome" placeholder="Ex: Netflix, Aluguel, Mercado..." />
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-slate-400 text-xs block mb-1.5 ml-1">Valor (R$) *</label>
          <input type="number" id="inputValor" placeholder="0,00" step="0.01" min="0" />
        </div>
        <div>
          <label class="text-slate-400 text-xs block mb-1.5 ml-1">Data *</label>
          <input type="date" id="inputData" />
        </div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-slate-400 text-xs block mb-1.5 ml-1">Categoria</label>
          <select id="inputCategoria">
            <option value="Moradia">🏠 Moradia</option>
            <option value="Mercado">🛒 Mercado</option>
            <option value="Transporte">🚗 Transporte</option>
            <option value="Lazer">🍕 Lazer</option>
            <option value="Cartão">💳 Cartão</option>
            <option value="Saúde">🏥 Saúde</option>
            <option value="Assinaturas">🛡️ Assinaturas</option>
            <option value="Investimentos">💰 Investimentos</option>
          </select>
        </div>
        <div>
          <label class="text-slate-400 text-xs block mb-1.5 ml-1">Parcelas</label>
          <select id="inputParcelas">
            <option value="1">À vista (1x)</option>
            <option value="2">2x</option>
            <option value="3">3x</option>
            <option value="4">4x</option>
            <option value="5">5x</option>
            <option value="6">6x</option>
            <option value="12">12x</option>
          </select>
        </div>
      </div>
      <button onclick="saveItem()" class="btn-primary w-full py-3.5 rounded-xl font-semibold text-sm mt-2">
        Salvar Despesa
      </button>
    </div>
  </div>
</div>

<script>
const CATS={Moradia:'🏠',Mercado:'🛒',Transporte:'🚗',Lazer:'🍕',Cartão:'💳',Saúde:'🏥',Assinaturas:'🛡️',Investimentos:'💰'};
const MONTHS=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
let curDate=new Date();
let curYear=curDate.getFullYear();
let curMonth=curDate.getMonth();

function getData(){return JSON.parse(localStorage.getItem('fpro_v2')||'[]')}
function saveData(d){localStorage.setItem('fpro_v2',JSON.stringify(d))}
function fmt(v){return'R$ '+parseFloat(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2})}

function render(){
  const items=getData().filter(i=>i.monthKey===`${curYear}-${String(curMonth+1).padStart(2,'0')}`);
  const total=items.reduce((s,i)=>s+parseFloat(i.valor),0);
  const paid=items.filter(i=>i.pago);
  const cartao=items.filter(i=>i.categoria==='Cartão').reduce((s,i)=>s+parseFloat(i.valor),0);
  const pct=items.length?Math.round(paid.length/items.length*100):0;

  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressLabel').textContent=`${paid.length} de ${items.length} pagas`;
  document.getElementById('progressPct').textContent=pct+'%';
  document.getElementById('cardSaldo').textContent=fmt(paid.reduce((s,i)=>s+parseFloat(i.valor),0));
  document.getElementById('cardGastos').textContent=fmt(total);
  document.getElementById('cardCartao').textContent=fmt(cartao);
  document.getElementById('monthLabel').textContent=MONTHS[curMonth]+' de '+curYear;
  document.getElementById('headerDate').textContent=MONTHS[curMonth]+' '+curYear;

  const el=document.getElementById('itemsList');
  if(!items.length){
    el.innerHTML='<div class="empty-state">📭<p>Nenhuma despesa</p></div>';
    return;
  }

  el.innerHTML=items.sort((a,b)=>a.data>b.data?1:-1).map(item=>`
    <div class="item-row px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 glass rounded-xl flex items-center justify-center">${CATS[item.categoria]||'💸'}</div>
        <div>
          <p class="text-sm font-medium">${item.nome}</p>
          <p class="text-xs text-slate-500">${item.data.split('-').reverse().join('/')}</p>
        </div>
      </div>
      <div class="text-right">
        <p class="text-sm font-bold">${fmt(item.valor)}</p>
        <button onclick="togglePago('${item.id}')" class="badge ${item.pago?'status-paid':'status-pending'}">${item.pago?'Pago':'Pendente'}</button>
      </div>
    </div>`).join('');
}

function changeMonth(dir){curMonth+=dir;if(curMonth>11){curMonth=0;curYear++}else if(curMonth<0){curMonth=11;curYear--}render()}
function openModal(){document.getElementById('modalOverlay').style.display='flex';document.getElementById('inputData').valueAsDate=new Date()}
function closeModal(){document.getElementById('modalOverlay').style.display='none'}
function closeModalOutside(e){if(e.target.id==='modalOverlay')closeModal()}

function saveItem(){
  const nome=document.getElementById('inputNome').value;
  const valor=document.getElementById('inputValor').value;
  const data=document.getElementById('inputData').value;
  const cat=document.getElementById('inputCategoria').value;
  if(!nome||!valor||!data)return;
  const all=getData();
  all.push({id:Date.now(),nome,valor,data,categoria:cat,pago:false,monthKey:data.substring(0,7)});
  saveData(all);closeModal();render();
}

function togglePago(id){const all=getData();const i=all.findIndex(x=>x.id==id);all[i].pago=!all[i].pago;saveData(all);render()}
function exportPDF(){window.print()}
render();
</script>
</body>
</html>
